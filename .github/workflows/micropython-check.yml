name: MicroPython Code Validation by Ihor Koliasa

on:
  push:
    branches:
      - main

jobs:
  validate_code:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Validate Code
      uses: docker://ubuntu:latest

      with:
        args: |
          echo "Running MicroPython code validation" &&
          cd MicroPython &&
          apt-get update && apt-get install -y python3 ||
          echo "No package manager found for the current OS" &&
          python3 -m pip install esptool &&
          python3 -m pip install -U platformio &&
          python3 -m pip install \
            adafruit-ampy \
            bitarray \
            bitstring \
            certifi \
            cffi \
            charset-normalizer \
            click \
            colorama \
            colorclass \
            cryptography \
            docopt \
            ecdsa \
            esptool \
            idna \
            intelhex \
            packaging \
            pip-upgrader \
            pycparser \
            pyreadline \
            pyserial \
            python-dotenv \
            pyudev \
            PyYAML \
            reedsolo \
            requests \
            rshell \
            setuptools \
            six \
            terminaltables \
            urllib3